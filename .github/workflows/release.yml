name: Release NexBoost

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Nettoyer le bundle cache
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force "src-tauri/target/release/bundle" -ErrorAction SilentlyContinue

      - name: Build Tauri app (avec signature)
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Créer la release et uploader latest.json
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag     = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''

          # Lister tous les fichiers pour debug
          Write-Host "=== Contenu du dossier bundle ==="
          Get-ChildItem -Recurse "src-tauri/target/release/bundle/" | Select-Object -ExpandProperty FullName

          # Trouver les fichiers
          $exe     = Get-ChildItem -Recurse "src-tauri/target/release/bundle/nsis" -Filter "*-setup.exe" |
                       Where-Object { $_.Name -notlike "*.sig" } | Select-Object -First 1
          $msi     = Get-ChildItem -Recurse "src-tauri/target/release/bundle/msi" -Filter "*.msi" |
                       Where-Object { $_.Name -notlike "*.sig" -and $_.Name -notlike "*.zip" } | Select-Object -First 1
          $nsisZip = Get-ChildItem -Recurse "src-tauri/target/release/bundle/nsis" -Filter "*.nsis.zip" |
                       Where-Object { $_.Name -notlike "*.sig" } | Select-Object -First 1
          $sigFile = Get-ChildItem -Recurse "src-tauri/target/release/bundle/nsis" -Filter "*.nsis.zip.sig" |
                       Select-Object -First 1

          if (-not $sigFile)  { throw "Fichier *.nsis.zip.sig introuvable — la signature a echoue." }
          if (-not $nsisZip)  { throw "Fichier *.nsis.zip introuvable." }

          $signature = (Get-Content $sigFile.FullName -Raw).Trim()
          Write-Host "Signature OK : $($sigFile.Name)"

          # Créer la release avec .exe, .msi et .nsis.zip
          gh release create $tag `
            --title "NexBoost $tag" `
            --notes "NexBoost $tag — mise a jour automatique disponible." `
            $exe.FullName `
            $msi.FullName `
            $nsisZip.FullName

          # Construire et uploader latest.json
          $downloadUrl = "https://github.com/Klovy-Dev/nexboost/releases/download/$tag/$($nsisZip.Name)"
          $pubDate     = (Get-Date -AsUTC -Format "yyyy-MM-ddTHH:mm:ssZ")

          $payload = [ordered]@{
            version  = $version
            notes    = "NexBoost $tag"
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url       = $downloadUrl
              }
            }
          }
          $payload | ConvertTo-Json -Depth 10 | Out-File "latest.json" -Encoding UTF8NoBOM
          Write-Host "=== latest.json ==="
          Get-Content "latest.json"

          gh release upload $tag "latest.json" --clobber
          Write-Host "latest.json uploade !"
