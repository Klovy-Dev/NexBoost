name: Release NexBoost

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'NexBoost ${{ github.ref_name }}'
          releaseBody: |
            ## NexBoost ${{ github.ref_name }}

            ### Installation
            Télécharge le fichier `.exe` ci-dessous et lance l'installation.

            ### Mise à jour automatique
            Si tu as déjà NexBoost installé, la mise à jour sera proposée automatiquement dans l'application.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false

      - name: Générer et uploader latest.json
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $tag     = "${{ github.ref_name }}"

          $nsisZip    = "src-tauri/target/release/bundle/nsis/NexBoost_${version}_x64-setup.nsis.zip"
          $nsisZipSig = "src-tauri/target/release/bundle/nsis/NexBoost_${version}_x64-setup.nsis.zip.sig"

          # Upload le .nsis.zip (nécessaire pour la mise à jour in-app)
          gh release upload $tag $nsisZip --clobber

          # Lire la signature
          $signature  = (Get-Content $nsisZipSig -Raw).Trim()
          $downloadUrl = "https://github.com/Klovy-Dev/nexboost/releases/download/$tag/NexBoost_${version}_x64-setup.nsis.zip"
          $pubDate    = (Get-Date -AsUTC -Format "yyyy-MM-ddTHH:mm:ssZ")

          # Construire latest.json
          $payload = [ordered]@{
            version  = $version
            notes    = "NexBoost $tag"
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url       = $downloadUrl
              }
            }
          }
          $payload | ConvertTo-Json -Depth 10 | Out-File "latest.json" -Encoding UTF8NoBOM

          # Upload latest.json
          gh release upload $tag "latest.json" --clobber
          Write-Host "latest.json uploadé avec succès !"
